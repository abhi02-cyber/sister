<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mission 2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.quiz-box{

background:white;
width:500px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.3);

}

h1{

margin-bottom:20px;

}

button{

display:block;

width:100%;

margin-top:15px;

padding:15px;

font-size:18px;

border:none;

border-radius:10px;

cursor:pointer;

background:#6c63ff;

color:white;

}

button:hover{

background:#5146e1;

}

#result{

margin-top:20px;

font-size:22px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="quiz-box">

<h1>❤️ Mission 2 ❤️</h1>

<h2>What is My Favourite Colour?</h2>

<button onclick="wrong()">Blue</button>

<button onclick="correct()">Pink</button>

<button onclick="wrong()">Green</button>

<button onclick="wrong()">Black</button>

<p id="result"></p>

</div>

<script>

function correct(){

document.getElementById("result").innerHTML="🎉 Correct Answer ❤️";

setTimeout(function(){

window.location.href="mission3.html";

},1500);

}

function wrong(){

document.getElementById("result").innerHTML="❌ Try Again 😊";

}

</script>

</body>

</html>
