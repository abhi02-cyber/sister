<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mission 1</title>

<link rel="stylesheet" href="../style.css">

<style>

body{

background:linear-gradient(135deg,#000428,#004e92);

}

.box{

width:400px;

padding:40px;

background:white;

color:black;

border-radius:20px;

text-align:center;

box-shadow:0 0 25px rgba(255,255,255,.3);

}

input{

width:100%;

padding:15px;

font-size:22px;

margin-top:20px;

text-align:center;

border-radius:10px;

border:2px solid gray;

}

button{

margin-top:20px;

}

#message{

margin-top:20px;

font-size:20px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="box">

<h1>🔐 Mission 1</h1>

<h3>Unlock The Secret Door</h3>

<p>

Hint ❤️<br><br>

Enter Your Birthday Date

</p>

<input
type="password"
id="pin"
maxlength="4"
placeholder="****">

<button onclick="checkPin()">

Unlock

</button>

<p id="message"></p>

</div>

<script>

function checkPin(){

let pin=document.getElementById("pin").value;

if(pin=="2009"){      // <<< अपना PIN यहाँ बदलें

document.getElementById("message").innerHTML="✅ Correct ❤️";

setTimeout(function(){

window.location.href="mission2.html";

},1500);

}

else{

document.getElementById("message").innerHTML="❌ Wrong PIN";

}

}

</script>

</body>

</html>
