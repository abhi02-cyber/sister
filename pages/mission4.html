<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Cake</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
overflow:hidden;
}

.container{
text-align:center;
}

.cake{
font-size:170px;
}

.candle{
font-size:60px;
transition:.5s;
}

button{

padding:15px 35px;
font-size:20px;
margin-top:20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff4081;
color:white;

}

button:hover{

background:#e91e63;

}

#message{

margin-top:30px;
font-size:28px;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<div class="candle" id="candle">
🕯️🕯️🕯️
</div>

<div class="cake">
🎂
</div>

<button onclick="blow()">

Blow Candle 🎂

</button>

<p id="message"></p>

<audio id="song" controls preload="auto">
    <source src="../assets/music/happy_birthday.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

</div>

<script>

function blow(){

document.getElementById("candle").innerHTML="💨";

document.getElementById("message").innerHTML="🎉 Happy Birthday Sister ❤️";

document.getElementById("song").play();

setTimeout(function(){

window.location.href="final.html";

},20000);

}

</script>

</body>

</html>
